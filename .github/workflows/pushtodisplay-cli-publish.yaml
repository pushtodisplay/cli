name: PushToDisplay CLI Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - alpha
          - beta
          - rc
          - stable
      version_bump:
        description: "Version bump"
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      npm_tag:
        description: "Override npm dist-tag (leave empty for default: stable->latest, pre-release->release_type)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write

concurrency:
  group: cli-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish pushtodisplay
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Lint & typecheck
        run: |
          npm run lint
          npm run typecheck

      - name: Run tests
        run: npm test -- --watchAll=false

      - name: Determine version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          BASE=$(echo "$CURRENT" | sed 's/-.*//')

          # Bump base version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          case "${{ inputs.version_bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          BUMPED="${MAJOR}.${MINOR}.${PATCH}"

          if [[ "${{ inputs.release_type }}" == "stable" ]]; then
            NEW_VERSION="$BUMPED"
          else
            # Find the next pre-release number by parsing all existing versions
            TAG="${{ inputs.release_type }}"
            PRE_NUM=$(node -e "
              const versions = JSON.parse(require('child_process').execSync(
                'npm view pushtodisplay versions --json', { encoding: 'utf8' }
              ).trim() || '[]');
              const prefix = '${BUMPED}-${TAG}.';
              const max = versions
                .filter(v => v.startsWith(prefix))
                .map(v => parseInt(v.slice(prefix.length), 10))
                .filter(n => !isNaN(n))
                .reduce((a, b) => Math.max(a, b), -1);
              console.log(max + 1);
            " 2>/dev/null || echo "0")

            NEW_VERSION="${BUMPED}-${TAG}.${PRE_NUM}"
          fi

          # Determine npm dist-tag: explicit override > default (stable->latest, pre-release->release_type)
          if [[ -n "${{ inputs.npm_tag }}" ]]; then
            DIST_TAG="${{ inputs.npm_tag }}"
          elif [[ "${{ inputs.release_type }}" == "stable" ]]; then
            DIST_TAG="latest"
          else
            DIST_TAG="${{ inputs.release_type }}"
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Will publish pushtodisplay@${NEW_VERSION} with tag: ${DIST_TAG}"

      - name: Set version in package.json
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Production build
        run: npm run build:prod

      - name: Verify build artifacts
        run: |
          echo "=== Build output ==="
          ls -lh dist/
          echo ""
          echo "=== Package contents ==="
          npm pack --dry-run 2>&1

      - name: Publish to npm
        if: ${{ inputs.dry_run == false }}
        run: npm publish --provenance --tag ${{ steps.version.outputs.tag }}

      - name: Dry run publish
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "DRY RUN - would publish:"
          echo "  Package: pushtodisplay@${{ steps.version.outputs.version }}"
          echo "  Tag: ${{ steps.version.outputs.tag }}"
          npm pack --dry-run

      - name: Commit version & create git tag
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(cli): release v${{ steps.version.outputs.version }}"
          git tag "cli-v${{ steps.version.outputs.version }}"
          git push origin HEAD "cli-v${{ steps.version.outputs.version }}"

      - name: Verify publish
        if: ${{ inputs.dry_run == false }}
        run: |
          echo "Waiting for npm registry propagation..."
          sleep 10
          npm info pushtodisplay@${{ steps.version.outputs.version }} version
          echo "pushtodisplay@${{ steps.version.outputs.version }} is live"
